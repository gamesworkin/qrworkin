<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>QR Workin' | Gerador Avançado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>QR Workin'</h1>
        <select id="dataType">
            <option value="url">URL / Texto</option>
            <option value="wifi">Wi-Fi</option>
            <option value="contact">Contato (vCard)</option>
            <option value="location">Localização (Google Maps)</option>
        </select>

        <div id="inputContainer">
            <input type="text" id="qrInput" placeholder="Conteúdo...">
        </div>

        <div class="controls-grid">
            <input type="color" id="qrColor" value="#000000">
            <select id="dotType">
                <option value="rounded">Arredondado</option>
                <option value="dots">Pontos</option>
                <option value="square">Quadrado</option>
            </select>
        </div>
        <input type="file" id="logoInput" accept="image/*">
        
        <button id="generateBtn">Gerar QR Code</button>
        <button id="downloadBtn">Baixar PNG</button>
        <div id="qrCodeTarget"></div>
    </div>
    <script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
    <script src="script.js"></script>
</body>
</html>
