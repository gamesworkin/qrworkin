<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Workin' | Gerador Completo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>QR Workin'</h1>
        <div class="main-content">
            <input type="text" id="qrInput" placeholder="URL ou texto">
            <div class="controls-grid">
                <input type="color" id="qrColor" title="Cor dos pontos" value="#000000">
                <select id="dotType">
                    <option value="rounded">Arredondado</option>
                    <option value="dots">Pontos</option>
                    <option value="square">Quadrado</option>
                </select>
                <input type="file" id="logoInput" accept="image/*">
            </div>
            <button id="generateBtn">Gerar e Customizar</button>
            <button id="downloadBtn">Baixar QR Code</button>
            <div id="qrCodeTarget"></div>
        </div>
    </div>
    
    <script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
    <script src="script.js"></script>
</body>
</html>
